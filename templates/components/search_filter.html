<!-- ==========================================================================
    CRM LEAD FILTER & CONTROL DECK
    ========================================================================== -->
<div class="bg-white p-4 sm:p-6 rounded-3xl border border-slate-200/80 shadow-sm flex flex-col md:flex-row gap-4 justify-between items-stretch md:items-center max-w-7xl mx-auto mb-6">
  
  <!-- Interactive Filters & Search Block -->
  <div class="flex-1 grid grid-cols-1 sm:grid-cols-12 gap-3">
    
    <!-- Real-time Search Query Input -->
    <div class="relative sm:col-span-7">
      <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
      <input id="lead-search" oninput="filterLeads()" type="text" placeholder="Search by name, area, advisor..." class="w-full pl-11 pr-4 py-3 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-brand-orange focus:ring-1 focus:ring-brand-orange transition-all">
    </div>

    <!-- Live Filter Status Selector -->
    <div class="relative sm:col-span-5">
      <select id="lead-filter-status" onchange="filterLeads()" class="w-full pl-4 pr-10 py-3 bg-white border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-brand-orange appearance-none cursor-pointer transition-all">
        <option value="ALL">All Lead Statuses</option>
        <option value="NEW">New</option>
        <option value="CALLED">Called</option>
        <option value="INTERESTED">Interested</option>
        <option value="SITE_VISIT">Site Visit Scheduled</option>
        <option value="CLOSED">Closed</option>
      </select>
      <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"></i>
    </div>

  </div>

  <!-- Manually Trigger Adding Lead Button -->
  <button onclick="openAddLeadModal()" class="py-3 px-6 rounded-xl bg-brand-orange hover:bg-brand-orangeDark text-white font-accent font-bold text-sm shadow-md hover:shadow-lg flex items-center justify-center gap-2 transition-all shrink-0">
    <i class="fa-solid fa-plus text-xs"></i>
    <span>Add Lead Manually</span>
  </button>

</div>
